<!-- Force page to always start at HOME section -->
<script>
  // Disable browser's automatic scroll restoration
  if ('scrollRestoration' in window.history) {
    window.history.scrollRestoration = 'manual';
  }
  
  // Immediately clear any hash and force instant scroll to top
  if (window.location.hash) {
    window.history.replaceState(null, null, window.location.pathname);
  }
  window.scrollTo({ top: 0, behavior: 'instant' });
  
  // On page load completion, force scroll to top
  window.addEventListener('load', function() {
    window.scrollTo({ top: 0, behavior: 'instant' });
  });
  
  // KEY FIX: Before refresh/unload, strip the hash so the page reloads at top
  window.addEventListener('beforeunload', function() {
    if (window.location.hash) {
      window.history.replaceState(null, null, window.location.pathname);
    }
  });
</script>

<script>
// Auto-load sections
async function loadSection(id, file) {
  const res = await fetch(file);
  document.getElementById(id).innerHTML = await res.text();
  
  // Re-initialize animations and components after loading
  if (id === 'network') {
    setTimeout(() => initNetworkTraffic?.(), 150);
  }
  if (id === 'dashboard') {
    setTimeout(() => initDashboard?.(), 150);
  }
  if (id === 'router-sim') {
    setTimeout(() => initRouterSim?.(), 150);
  }
}

// Load all sections, then scroll to top and init animations
Promise.all([
  loadSection("hero", "sections/hero.html"),
  loadSection("about", "sections/about.html"),
  loadSection("skills", "sections/skills.html"),
  loadSection("projects", "sections/projects.html"),
  loadSection("network", "sections/network.html"),
  loadSection("router-sim", "sections/router-sim.html"),
  loadSection("dashboard", "sections/dashboard.html")
]).then(() => {
  // Force top after all sections have been injected
  window.scrollTo({ top: 0, behavior: 'instant' });
  // Now that all elements exist, init scroll animations
  if (typeof initScrollAnimations === 'function') initScrollAnimations();
  if (typeof initBinaryEffect    === 'function') initBinaryEffect();
});

// Theme toggle functionality
const themeToggle = document.querySelector('.theme-toggle');
const htmlElement = document.documentElement;

// Load saved theme preference
const savedTheme = localStorage.getItem('theme') || 'dark';
htmlElement.setAttribute('data-theme', savedTheme);

themeToggle.addEventListener('click', () => {
  const currentTheme = htmlElement.getAttribute('data-theme');
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  htmlElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
});
</script>
